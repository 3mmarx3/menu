<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Menu UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style/main.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#f97316',
                        brandLight: '#ffedd5',
                        darkBg: '#0b0f19',
                        darkPanel: '#131c2f',
                        darkBorder: '#1f2937'
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-white h-screen overflow-hidden flex flex-col p-3 sm:p-4 md:p-6 gap-4 md:gap-6 selection:bg-brand selection:text-white">

    <header
        class="w-full h-16 shrink-0 glass-panel bg-white/70 dark:bg-darkPanel/70 border border-gray-200 dark:border-darkBorder rounded-3xl px-4 sm:px-6 flex items-center justify-between z-20 relative transition-colors duration-200">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-xl bg-gradient-to-tr from-orange-600 to-brand flex items-center justify-center shrink-0">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <span class="font-bold text-xl tracking-tight hidden xs:inline sm:inline">NexDine</span>
        </div>

        <div class="flex items-center gap-1 sm:gap-2 md:gap-5">
            <button id="search-btn"
                class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
            <button id="gift-btn"
                class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200 relative">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7">
                    </path>
                </svg>
                <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            <button id="cart-toggle-btn"
                class="lg:hidden w-10 h-10 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200 relative">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                <span id="cart-badge"
                    class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 bg-brand text-white text-[10px] font-bold rounded-full items-center justify-center border-2 border-white dark:border-darkPanel transition-colors duration-200">0</span>
            </button>
            <button id="theme-toggle"
                class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200">
                <svg id="theme-icon-dark" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                    </path>
                </svg>
                <svg id="theme-icon-light" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
            <div class="h-6 w-px bg-gray-300 dark:bg-gray-700 mx-1 hidden sm:block transition-colors duration-200">
            </div>
            <button class="flex items-center gap-2 pl-0 sm:pl-2">
                <div
                    class="w-9 h-9 rounded-full bg-brandLight dark:bg-brand/20 border border-brand/30 flex items-center justify-center text-brand font-bold text-sm shrink-0 transition-colors duration-200">
                    Am
                </div>
            </button>
        </div>
    </header>

    <div class="flex-1 flex flex-col lg:flex-row gap-4 md:gap-6 overflow-hidden">
        <main class="flex-1 flex flex-col gap-4 md:gap-6 overflow-y-auto pr-0 lg:pr-2 pb-6 lg:pb-0 relative min-w-0">

            <div
                class="w-full relative overflow-hidden rounded-3xl bg-gray-900 dark:bg-darkPanel p-5 sm:p-6 flex flex-col md:flex-row items-start md:items-center justify-between border border-gray-800 dark:border-darkBorder gap-4 group shrink-0 transition-colors duration-200">
                <div class="flex flex-col items-start z-10 text-white">
                    <span
                        class="inline-block px-3 py-1 bg-brand/20 text-brand rounded-full text-xs font-bold mb-3 border border-brand/30 uppercase tracking-wider">Limited
                        Time</span>
                    <h2 class="text-2xl sm:text-3xl font-bold mb-2 tracking-tight">Get 20% Off Your First Order!</h2>
                    <p class="text-gray-400 text-sm flex flex-wrap items-center gap-2">
                        Use code
                        <span
                            class="font-mono text-white bg-white/10 px-2.5 py-1 rounded-md tracking-wider">AMMAR20</span>
                        at checkout.
                    </p>
                </div>
                <button
                    class="z-10 w-full md:w-auto shrink-0 bg-brand hover:bg-orange-600 text-white font-semibold py-3 px-8 rounded-full transition-all active:scale-95 whitespace-nowrap text-lg">
                    Claim Offer
                </button>
            </div>

            <nav
                class="flex gap-3 overflow-x-auto pb-2 sticky top-0 z-10 bg-gray-50/95 dark:bg-darkBg/95 backdrop-blur-xl shrink-0 transition-colors duration-200">
                <button data-cat="new" onclick="filterCategory('new')"
                    class="category-btn px-6 py-2.5 rounded-full bg-brand text-white font-bold text-sm whitespace-nowrap tracking-wide border border-brand shrink-0 transition-colors duration-200">!
                    NEW !</button>
                <button data-cat="pizza" onclick="filterCategory('pizza')"
                    class="category-btn px-6 py-2.5 rounded-full bg-white dark:bg-darkPanel border border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-300 font-bold text-sm hover:border-brand/50 transition-colors duration-200 whitespace-nowrap tracking-wide shrink-0">PIZZA</button>
                <button data-cat="sets" onclick="filterCategory('sets')"
                    class="category-btn px-6 py-2.5 rounded-full bg-white dark:bg-darkPanel border border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-300 font-bold text-sm hover:border-brand/50 transition-colors duration-200 whitespace-nowrap tracking-wide shrink-0">SETS</button>
                <button data-cat="drinks" onclick="filterCategory('drinks')"
                    class="category-btn px-6 py-2.5 rounded-full bg-white dark:bg-darkPanel border border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-300 font-bold text-sm hover:border-brand/50 transition-colors duration-200 whitespace-nowrap tracking-wide shrink-0">DRINKS</button>
                <button data-cat="sauces" onclick="filterCategory('sauces')"
                    class="category-btn px-6 py-2.5 rounded-full bg-white dark:bg-darkPanel border border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-300 font-bold text-sm hover:border-brand/50 transition-colors duration-200 whitespace-nowrap tracking-wide shrink-0">SAUCES</button>
            </nav>

            <div>
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-6 bg-brand rounded-full inline-block"></span>
                    Trending Now
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="products-grid">
                </div>
            </div>
        </main>

        <aside class="hidden lg:flex w-full lg:w-[380px] h-full shrink-0 flex-col gap-4">
            <div
                class="glass-panel bg-white/60 dark:bg-darkPanel/60 border border-gray-200 dark:border-darkBorder rounded-3xl p-4 flex items-center justify-between transition-colors duration-200">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-blue-500 shrink-0 transition-colors duration-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-bold">Delivery: <span class="text-red-500">Closed now</span></p>
                        <p class="text-xs text-brand cursor-pointer hover:underline">Change time to order now.</p>
                    </div>
                </div>
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </div>

            <div
                class="flex-1 glass-panel bg-white/60 dark:bg-darkPanel/60 border border-gray-200 dark:border-darkBorder rounded-3xl flex flex-col overflow-hidden relative transition-colors duration-200">
                <div
                    class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent to-white/10 dark:to-black/10">
                </div>
                <div class="flex-1 overflow-y-auto p-4 z-10 flex flex-col" id="cart-container">
                    <div class="m-auto flex flex-col items-center justify-center text-center opacity-50"
                        id="empty-cart">
                        <div
                            class="w-32 h-32 rounded-full border-2 border-dashed border-gray-400 dark:border-gray-600 flex items-center justify-center mb-4 relative transition-colors duration-200">
                            <div
                                class="absolute inset-2 rounded-full bg-gray-100 dark:bg-gray-800 animate-pulse opacity-50 transition-colors duration-200">
                            </div>
                            <svg class="w-10 h-10 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                                </path>
                            </svg>
                        </div>
                        <p class="text-sm font-medium">No products added</p>
                    </div>
                    <div id="cart-items" class="flex flex-col gap-3 hidden"></div>
                </div>

                <div
                    class="p-4 border-t border-gray-200 dark:border-darkBorder bg-white/80 dark:bg-darkPanel/90 z-10 transition-colors duration-200">
                    <button
                        class="w-full flex items-center justify-center gap-2 py-3 rounded-xl border border-dashed border-gray-300 dark:border-gray-600 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:border-brand hover:text-brand transition-colors duration-200 mb-4">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Discount code / activate voucher
                    </button>

                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-gray-500 dark:text-gray-400">Total:</span>
                        <span id="cart-total" class="text-2xl font-bold text-brand">0.00 EGP</span>
                    </div>

                    <button
                        class="w-full py-4 rounded-xl bg-gray-800 dark:bg-brand text-white font-bold text-sm hover:bg-gray-700 dark:hover:bg-orange-500 transition-all flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed"
                        id="checkout-btn" disabled>
                        Go to checkout
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 z-50">
        <div id="cart-modal-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div id="cart-modal-panel"
            class="absolute bottom-0 left-0 right-0 sm:right-0 sm:top-0 sm:left-auto sm:w-[420px] sm:max-w-[90vw] h-[85vh] sm:h-full bg-white dark:bg-darkPanel rounded-t-3xl sm:rounded-t-none sm:rounded-l-3xl flex flex-col overflow-hidden border border-gray-200 dark:border-darkBorder translate-y-full sm:translate-y-0 sm:translate-x-full transition-colors duration-200">
            <div
                class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-darkBorder shrink-0 transition-colors duration-200">
                <h3 class="font-bold text-lg">Your Cart</h3>
                <button id="cart-modal-close"
                    class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 flex flex-col" id="cart-container-mobile">
                <div class="m-auto flex flex-col items-center justify-center text-center opacity-50"
                    id="empty-cart-mobile">
                    <div
                        class="w-28 h-28 rounded-full border-2 border-dashed border-gray-400 dark:border-gray-600 flex items-center justify-center mb-4 relative transition-colors duration-200">
                        <div
                            class="absolute inset-2 rounded-full bg-gray-100 dark:bg-gray-800 animate-pulse opacity-50 transition-colors duration-200">
                        </div>
                        <svg class="w-9 h-9 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-sm font-medium">No products added</p>
                </div>
                <div id="cart-items-mobile" class="flex flex-col gap-3 hidden"></div>
            </div>

            <div
                class="p-4 border-t border-gray-200 dark:border-darkBorder bg-white/80 dark:bg-darkPanel/90 shrink-0 transition-colors duration-200">
                <button
                    class="w-full flex items-center justify-center gap-2 py-3 rounded-xl border border-dashed border-gray-300 dark:border-gray-600 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:border-brand hover:text-brand transition-colors duration-200 mb-4">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Discount code / activate voucher
                </button>

                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-500 dark:text-gray-400">Total:</span>
                    <span id="cart-total-mobile" class="text-2xl font-bold text-brand">0.00 EGP</span>
                </div>

                <button
                    class="w-full py-4 rounded-xl bg-gray-800 dark:bg-brand text-white font-bold text-sm hover:bg-gray-700 dark:hover:bg-orange-500 transition-all flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed"
                    id="checkout-btn-mobile" disabled>
                    Go to checkout
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="./assets/script/app.js"></script>
</body>

</html>
